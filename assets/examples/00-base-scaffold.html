<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{TITLE}}</title>
<style>
  :root {
    --ivory:#FAF9F5; --paper:#FFFFFF; --slate:#141413;
    --clay:#D97757; --clay-d:#B85C3E; --oat:#E3DACC; --olive:#788C5D;
    --g100:#F0EEE6; --g200:#E6E3DA; --g300:#D1CFC5; --g500:#87867F; --g700:#3D3D3A;
    --serif: ui-serif, Georgia, "Times New Roman", Times, serif;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --mono: ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace;
    --radius-panel:12px; --radius-row:8px; --border:1.5px solid var(--g300);
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin:0; background:var(--ivory); color:var(--slate);
    font-family:var(--sans); font-size:15px; line-height:1.55;
    -webkit-font-smoothing:antialiased;
  }
  .wrap { max-width:1120px; margin:0 auto; padding:48px 32px 96px; }
  .eyebrow {
    font-family:var(--mono); font-size:12px; letter-spacing:0.12em;
    text-transform:uppercase; color:var(--g500);
    display:flex; align-items:center; gap:12px; margin-bottom:16px;
  }
  .eyebrow::before { content:""; width:24px; height:1.5px; background:var(--clay); }
  h1 { font-family:var(--serif); font-weight:500; font-size:38px;
       letter-spacing:-0.01em; margin:0 0 8px; }
  .sub { color:var(--g500); max-width:640px; margin:0 0 40px; }
  h2 { font-family:var(--serif); font-weight:500; font-size:24px;
       letter-spacing:-0.01em; margin:0 0 16px; }
  .panel { background:var(--paper); border:var(--border);
           border-radius:var(--radius-panel); padding:24px; margin-bottom:20px; }
  a { color:var(--clay); text-decoration:none; }
  a:hover { color:var(--clay-d); }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="eyebrow">{{EYEBROW}}</div>
      <h1>{{TITLE}}</h1>
      <p class="sub">{{SUBTITLE}}</p>
    </header>
    <!-- artifact content goes here -->
    <section class="panel">
      <h2>Section</h2>
      <p>Replace this with the artifact body.</p>
    </section>
  </div>
</body>
</html>
